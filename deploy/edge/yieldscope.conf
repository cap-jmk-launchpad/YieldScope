# YieldScope TLS vhost for nginx-gitlab-edge (:443) on blackpearl.
# Install: deploy/edge/apply-yieldscope-edge.sh (blackpearl, sudo).
#
# Fritz forwards WAN :443 → 192.168.10.33:443. Without this server_name block,
# yieldscope.d3bu7.com falls through to the majico default vhost.

upstream yieldscope_app {
    server 127.0.0.1:30082;
    keepalive 8;
}

server {
    listen 443 ssl;
    http2 on;
    server_name yieldscope.d3bu7.com;

    ssl_certificate     /etc/letsencrypt/live/yieldscope.d3bu7.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yieldscope.d3bu7.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 10m;
    proxy_read_timeout 120s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 120s;

    # Multi-year CEX sync walks many ≤30d Binance chunks / OKX pages.
    location /api/sync {
        proxy_pass http://yieldscope_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_set_header Accept-Encoding "";
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        proxy_pass http://yieldscope_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_set_header Accept-Encoding "";
        proxy_buffering off;
    }
}
