# YieldScope Supabase TLS vhost for nginx-gitlab-edge (:443) on blackpearl.
# Install: deploy/edge/apply-yieldscope-supabase-edge.sh (blackpearl, sudo).
#
# Kong NodePort 30595 on blackpearl. Studio is password-protected by Kong basic-auth
# (DASHBOARD_USERNAME / DASHBOARD_PASSWORD in yieldscope-supabase-secrets).

upstream yieldscope_supabase_kong {
    server 127.0.0.1:30595;
    keepalive 8;
}

server {
    listen 443 ssl;
    http2 on;
    server_name supabase.yieldscope.d3bu7.com;

    ssl_certificate     /etc/letsencrypt/live/supabase.yieldscope.d3bu7.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/supabase.yieldscope.d3bu7.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 25m;
    proxy_read_timeout 300s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;

    location / {
        proxy_pass http://yieldscope_supabase_kong;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_set_header Accept-Encoding "";
        proxy_buffering off;
        # Preserve Authorization for Kong basic-auth (Studio) + apikey
        proxy_pass_header Authorization;
    }
}
