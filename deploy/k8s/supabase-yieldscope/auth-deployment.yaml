apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  labels:
    app: auth
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      nodeSelector:
        kubernetes.io/hostname: engine
      # Bypass flaky CoreDNS (auth on engine → coredns on deck UDP timeouts).
      # mail: LE hostname → ClusterIP (avoid WAN hairpin). db: short name used in GOTRUE_DB_DATABASE_URL.
      hostAliases:
        - ip: 10.43.250.25
          hostnames:
            - mail.yieldscope.d3bu7.com
        - ip: 10.43.109.67
          hostnames:
            - db
            - db.supabase-yieldscope.svc.cluster.local
      initContainers:
        - name: wait-db
          image: postgres:15-alpine
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: yieldscope-supabase-secrets
                  key: POSTGRES_PASSWORD
          command: [sh, -c, "until pg_isready -h db -p 5432 -U postgres; do sleep 2; done"]
      containers:
        - name: auth
          image: supabase/gotrue:v2.186.0
          ports:
            - name: http
              containerPort: 9999
          env:
            - name: GOTRUE_API_HOST
              value: 0.0.0.0
            - name: GOTRUE_API_PORT
              value: "9999"
            - name: API_EXTERNAL_URL
              valueFrom:
                configMapKeyRef:
                  name: yieldscope-supabase-config
                  key: API_EXTERNAL_URL
            - name: GOTRUE_DB_DRIVER
              value: postgres
            - name: GOTRUE_DB_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: yieldscope-supabase-secrets
                  key: GOTRUE_DB_DATABASE_URL
            - name: GOTRUE_SITE_URL
              valueFrom:
                configMapKeyRef:
                  name: yieldscope-supabase-config
                  key: SITE_URL
            - name: GOTRUE_URI_ALLOW_LIST
              valueFrom:
                configMapKeyRef:
                  name: yieldscope-supabase-config
                  key: GOTRUE_URI_ALLOW_LIST
            - name: GOTRUE_MAILER_EXTERNAL_HOSTS
              valueFrom:
                configMapKeyRef:
                  name: yieldscope-supabase-config
                  key: GOTRUE_MAILER_EXTERNAL_HOSTS
            - name: GOTRUE_MAILER_URLPATHS_RECOVERY
              valueFrom:
                configMapKeyRef:
                  name: yieldscope-supabase-config
                  key: GOTRUE_MAILER_URLPATHS_RECOVERY
            - name: GOTRUE_MAILER_URLPATHS_CONFIRMATION
              valueFrom:
                configMapKeyRef:
                  name: yieldscope-supabase-config
                  key: GOTRUE_MAILER_URLPATHS_CONFIRMATION
            - name: GOTRUE_MAILER_URLPATHS_INVITE
              valueFrom:
                configMapKeyRef:
                  name: yieldscope-supabase-config
                  key: GOTRUE_MAILER_URLPATHS_INVITE
            - name: GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE
              valueFrom:
                configMapKeyRef:
                  name: yieldscope-supabase-config
                  key: GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE
            - name: GOTRUE_MAILER_URLPATHS_MAGIC_LINK
              valueFrom:
                configMapKeyRef:
                  name: yieldscope-supabase-config
                  key: GOTRUE_MAILER_URLPATHS_MAGIC_LINK
            - name: GOTRUE_MAILER_TEMPLATES_CONFIRMATION
              valueFrom:
                configMapKeyRef:
                  name: yieldscope-supabase-config
                  key: GOTRUE_MAILER_TEMPLATES_CONFIRMATION
            - name: GOTRUE_MAILER_TEMPLATES_RECOVERY
              valueFrom:
                configMapKeyRef:
                  name: yieldscope-supabase-config
                  key: GOTRUE_MAILER_TEMPLATES_RECOVERY
            - name: GOTRUE_MAILER_TEMPLATES_MAGIC_LINK
              valueFrom:
                configMapKeyRef:
                  name: yieldscope-supabase-config
                  key: GOTRUE_MAILER_TEMPLATES_MAGIC_LINK
            - name: GOTRUE_MAILER_TEMPLATES_EMAIL_CHANGE
              valueFrom:
                configMapKeyRef:
                  name: yieldscope-supabase-config
                  key: GOTRUE_MAILER_TEMPLATES_EMAIL_CHANGE
            - name: GOTRUE_MAILER_TEMPLATES_INVITE
              valueFrom:
                configMapKeyRef:
                  name: yieldscope-supabase-config
                  key: GOTRUE_MAILER_TEMPLATES_INVITE
            - name: GOTRUE_MAILER_SUBJECTS_CONFIRMATION
              valueFrom:
                configMapKeyRef:
                  name: yieldscope-supabase-config
                  key: GOTRUE_MAILER_SUBJECTS_CONFIRMATION
            - name: GOTRUE_MAILER_SUBJECTS_RECOVERY
              valueFrom:
                configMapKeyRef:
                  name: yieldscope-supabase-config
                  key: GOTRUE_MAILER_SUBJECTS_RECOVERY
            - name: GOTRUE_MAILER_SUBJECTS_MAGIC_LINK
              valueFrom:
                configMapKeyRef:
                  name: yieldscope-supabase-config
                  key: GOTRUE_MAILER_SUBJECTS_MAGIC_LINK
            - name: GOTRUE_MAILER_SUBJECTS_EMAIL_CHANGE
              valueFrom:
                configMapKeyRef:
                  name: yieldscope-supabase-config
                  key: GOTRUE_MAILER_SUBJECTS_EMAIL_CHANGE
            - name: GOTRUE_MAILER_SUBJECTS_INVITE
              valueFrom:
                configMapKeyRef:
                  name: yieldscope-supabase-config
                  key: GOTRUE_MAILER_SUBJECTS_INVITE
            - name: GOTRUE_DISABLE_SIGNUP
              value: "false"
            - name: GOTRUE_JWT_ADMIN_ROLES
              value: service_role
            - name: GOTRUE_JWT_AUD
              value: authenticated
            - name: GOTRUE_JWT_DEFAULT_GROUP_NAME
              value: authenticated
            - name: GOTRUE_JWT_EXP
              value: "3600"
            - name: GOTRUE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: yieldscope-supabase-secrets
                  key: JWT_SECRET
            - name: GOTRUE_JWT_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: yieldscope-supabase-config
                  key: GOTRUE_JWT_ISSUER
            - name: GOTRUE_EXTERNAL_EMAIL_ENABLED
              value: "true"
            - name: GOTRUE_MAILER_AUTOCONFIRM
              value: "false"
            - name: GOTRUE_SMTP_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: yieldscope-supabase-secrets
                  key: SMTP_ADMIN_EMAIL
            - name: GOTRUE_SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: yieldscope-supabase-secrets
                  key: SMTP_HOST
            - name: GOTRUE_SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: yieldscope-supabase-secrets
                  key: SMTP_PORT
            - name: GOTRUE_SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: yieldscope-supabase-secrets
                  key: SMTP_USER
            - name: GOTRUE_SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: yieldscope-supabase-secrets
                  key: SMTP_PASS
            - name: GOTRUE_SMTP_SENDER_NAME
              value: YieldScope
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 192Mi
---
apiVersion: v1
kind: Service
metadata:
  name: auth
  labels:
    app: auth
spec:
  selector:
    app: auth
  ports:
    - name: http
      port: 9999
      targetPort: http
