<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset your YieldScope password</title>
</head>
<body style="margin:0;padding:0;background:#05080f;color:#e8eef6;font-family:'IBM Plex Sans',Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#05080f;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:520px;background:#0c1524;border:1px solid #1a2a3f;">
          <tr>
            <td style="padding:28px 28px 8px;font-family:Georgia,'Times New Roman',serif;font-size:28px;letter-spacing:-0.02em;color:#e8eef6;">
              YieldScope
            </td>
          </tr>
          <tr>
            <td style="padding:8px 28px 0;font-size:18px;font-weight:600;color:#e8eef6;">
              Reset your password
            </td>
          </tr>
          <tr>
            <td style="padding:12px 28px 24px;font-size:15px;line-height:1.55;color:#8a9bb0;">
              We received a password reset request for <strong style="color:#e8eef6;">{{ .Email }}</strong>. Use the button below to choose a new password. If you did not ask for this, you can ignore this email.
            </td>
          </tr>
          <tr>
            <td style="padding:0 28px 28px;">
              <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:12px 22px;background:#3dffa8;color:#05080f;text-decoration:none;font-weight:650;font-size:15px;">
                Reset password
              </a>
            </td>
          </tr>
          <tr>
            <td style="padding:0 28px 28px;font-size:12px;line-height:1.5;color:#8a9bb0;">
              If the button does not work, open this link:<br />
              <a href="{{ .ConfirmationURL }}" style="color:#3dffa8;word-break:break-all;">{{ .ConfirmationURL }}</a>
            </td>
          </tr>
          <tr>
            <td style="padding:16px 28px 24px;border-top:1px solid #1a2a3f;font-size:11px;color:#8a9bb0;">
              YieldScope · <a href="{{ .SiteURL }}" style="color:#8a9bb0;">{{ .SiteURL }}</a>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
