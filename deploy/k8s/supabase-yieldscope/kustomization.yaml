apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: supabase-yieldscope
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: yieldscope-supabase-kong-config
    files:
      - config/kong.yml
      - config/kong-entrypoint.sh
  - name: yieldscope-supabase-migrate-scripts
    files:
      - scripts/migrate.sh
  - name: yieldscope-supabase-migrations
    files:
      - migrations/202607160001_earn_ledger.sql
      - migrations/202607160002_auth_profiles.sql
      - migrations/202607160003_sync_analytics.sql
      - migrations/202607160004_lunc_source.sql
      - migrations/202607180005_source_credentials.sql
      - migrations/202607180006_ohlcv_prices.sql
      - migrations/202607180007_query_performance_indexes.sql
      - migrations/202607180008_ledger_load_perf.sql
      - migrations/202607180009_earn_aggregates_materialized.sql
  # GoTrue fetches these over HTTP from auth-mail-templates (not Studio UI).
  - name: yieldscope-auth-mail-templates
    files:
      - confirmation.html=email-templates/confirmation.html
      - recovery.html=email-templates/recovery.html
      - magic_link.html=email-templates/magic_link.html
      - email_change.html=email-templates/email_change.html
      - invite.html=email-templates/invite.html
resources:
  - namespace.yaml
  - configmap.yaml
  # secret: deploy/scripts/k8s-yieldscope-supabase-secret.sh (never commit)
  - postgres-statefulset.yaml
  - postgres-service.yaml
  - auth-deployment.yaml
  - mail-templates-deployment.yaml
  - rest-deployment.yaml
  - storage-deployment.yaml
  - meta-deployment.yaml
  - studio-deployment.yaml
  - kong-deployment.yaml
  - kong-service.yaml
  - migrate-job.yaml
