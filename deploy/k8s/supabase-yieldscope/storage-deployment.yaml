apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: storage-data
  labels:
    app: storage
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: storage
  labels:
    app: storage
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: storage
  template:
    metadata:
      labels:
        app: storage
    spec:
      nodeSelector:
        kubernetes.io/hostname: engine
      initContainers:
        - name: wait-db
          image: postgres:15-alpine
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: yieldscope-supabase-secrets
                  key: POSTGRES_PASSWORD
          command: [sh, -c, "until pg_isready -h db -p 5432 -U postgres; do sleep 2; done"]
        - name: wait-rest
          image: curlimages/curl:8.12.1
          command: [sh, -c, "until curl -sf http://rest:3000/; do sleep 2; done"]
      containers:
        - name: storage
          image: supabase/storage-api:v1.60.4
          ports:
            - name: http
              containerPort: 5000
          env:
            - name: ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: yieldscope-supabase-secrets
                  key: ANON_KEY
            - name: SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: yieldscope-supabase-secrets
                  key: SERVICE_ROLE_KEY
            - name: POSTGREST_URL
              value: http://rest:3000
            - name: PGRST_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: yieldscope-supabase-secrets
                  key: JWT_SECRET
            - name: AUTH_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: yieldscope-supabase-secrets
                  key: JWT_SECRET
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: yieldscope-supabase-secrets
                  key: STORAGE_DATABASE_URL
            - name: FILE_SIZE_LIMIT
              value: "104857600"
            - name: STORAGE_BACKEND
              value: file
            - name: FILE_STORAGE_BACKEND_PATH
              value: /var/lib/storage
            - name: TENANT_ID
              value: stub
            - name: REGION
              value: stub
            - name: GLOBAL_S3_BUCKET
              value: stub
            - name: ENABLE_IMAGE_TRANSFORMATION
              value: "false"
            - name: STORAGE_PUBLIC_URL
              valueFrom:
                configMapKeyRef:
                  name: yieldscope-supabase-config
                  key: SUPABASE_PUBLIC_URL
          volumeMounts:
            - name: data
              mountPath: /var/lib/storage
          readinessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: storage-data
---
apiVersion: v1
kind: Service
metadata:
  name: storage
  labels:
    app: storage
spec:
  selector:
    app: storage
  ports:
    - name: http
      port: 5000
      targetPort: http
