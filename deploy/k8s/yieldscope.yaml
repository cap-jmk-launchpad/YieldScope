apiVersion: v1
kind: Namespace
metadata:
  name: yieldscope
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: yieldscope-web
  namespace: yieldscope
  labels:
    app.kubernetes.io/name: yieldscope
data:
  NEXT_PUBLIC_MONAD_RPC_URL: "https://testnet-rpc.monad.xyz"
  NEXT_PUBLIC_CHECKPOINT_ADDRESS: "0x0000000000000000000000000000000000000000"
  USE_FIXTURE_DEMO: "1"
  NEXT_PUBLIC_SUPABASE_URL: "https://supabase.majico.d3bu7.com"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: yieldscope-web
  namespace: yieldscope
  labels:
    app.kubernetes.io/name: yieldscope
    app.kubernetes.io/component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: yieldscope-web
  template:
    metadata:
      labels:
        app: yieldscope-web
        app.kubernetes.io/name: yieldscope
    spec:
      nodeSelector:
        kubernetes.io/hostname: engine
      containers:
        - name: web
          image: ghcr.io/cap-jmk-launchpad/yieldscope-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: yieldscope-web
            - secretRef:
                name: yieldscope-secrets
                optional: false
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 8
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: yieldscope-web
  namespace: yieldscope
  labels:
    app.kubernetes.io/name: yieldscope
spec:
  selector:
    app: yieldscope-web
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: yieldscope-web
  namespace: yieldscope
  labels:
    app.kubernetes.io/name: yieldscope
    app.kubernetes.io/component: web
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
spec:
  tls:
    - hosts:
        - yieldscope.d3bu7.com
      secretName: yieldscope-tls
  rules:
    - host: yieldscope.d3bu7.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: yieldscope-web
                port:
                  number: 3000
