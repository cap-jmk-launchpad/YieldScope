apiVersion: v1
kind: Namespace
metadata:
  name: yieldscope
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: yieldscope-web
  namespace: yieldscope
  labels:
    app.kubernetes.io/name: yieldscope
data:
  # Mainnet RPC for server-side stake reads + baked NEXT_PUBLIC_* at image build.
  MONAD_RPC_URL: "https://rpc.monad.xyz"
  NEXT_PUBLIC_MONAD_RPC_URL: "https://rpc.monad.xyz"
  # Public Monad RPC — wide eth_getLogs with wallet topic2 (full ClaimRewards,
  # no self-hosted archive node). Falls back to rpc3 chunked if needed.
  MONAD_ARCHIVE_RPC_URL: "https://rpc1.monad.xyz"
  MONAD_CLAIM_LOGS_CHUNK_BLOCKS: "1000"
  MONAD_CLAIM_HISTORY_MAX_BLOCKS: "6480000"
  MONAD_CLAIM_LOGS_CONCURRENCY: "12"
  # Optional: MONAD_EXPLORER_API_KEY in yieldscope-secrets (free Etherscan V2)
  # as a redundant indexed path. Not required — rpc1 covers full wallet history.
  MONAD_EXPLORER_API_URL: "https://api.etherscan.io/v2/api"
  MONAD_EXPLORER_CHAIN_ID: "143"
  # Attest stays fail-closed until a mainnet EarningsCheckpoint is deployed.
  NEXT_PUBLIC_CHECKPOINT_ADDRESS: "0x0000000000000000000000000000000000000000"
  # Must stay "0" in prod — fixture mode used to invent 2.5 MONAD earn rows
  # for every user who synced without a connected wallet.
  USE_FIXTURE_DEMO: "0"
  NEXT_PUBLIC_SUPABASE_URL: "https://supabase.yieldscope.d3bu7.com"
  # In-cluster Kong — server admin / price CronJob (avoids edge nginx 502s)
  SUPABASE_INTERNAL_URL: "http://kong.supabase-yieldscope.svc.cluster.local:8000"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: yieldscope-web
  namespace: yieldscope
  labels:
    app.kubernetes.io/name: yieldscope
    app.kubernetes.io/component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: yieldscope-web
  template:
    metadata:
      labels:
        app: yieldscope-web
        app.kubernetes.io/name: yieldscope
    spec:
      nodeSelector:
        # Image currently imported on blackpearl k3s ctr (engine SSH image sync blocked).
        kubernetes.io/hostname: blackpearl
      containers:
        - name: web
          image: ghcr.io/cap-jmk-real/yieldscope-web:latest
          imagePullPolicy: Never
          command: ["node"]
          args: ["web/server.js"]
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: yieldscope-web
            - secretRef:
                name: yieldscope-secrets
                optional: false
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 8
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: yieldscope-web
  namespace: yieldscope
  labels:
    app.kubernetes.io/name: yieldscope
spec:
  selector:
    app: yieldscope-web
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: yieldscope-web-nodeport
  namespace: yieldscope
  labels:
    app.kubernetes.io/name: yieldscope
    app.kubernetes.io/component: web
spec:
  type: NodePort
  selector:
    app: yieldscope-web
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30082
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: yieldscope-web
  namespace: yieldscope
  labels:
    app.kubernetes.io/name: yieldscope
    app.kubernetes.io/component: web
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
spec:
  tls:
    - hosts:
        - yieldscope.d3bu7.com
      secretName: yieldscope-tls
  rules:
    - host: yieldscope.d3bu7.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: yieldscope-web
                port:
                  number: 3000
---
# Every minute: upsert latest Binance 1m (+1d) candles into Postgres ohlcv.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: yieldscope-price-sync
  namespace: yieldscope
  labels:
    app.kubernetes.io/name: yieldscope
    app.kubernetes.io/component: price-sync
spec:
  schedule: "* * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: yieldscope-price-sync
        spec:
          restartPolicy: Never
          containers:
            - name: sync
              image: curlimages/curl:8.12.1
              env:
                - name: PRICE_SYNC_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: yieldscope-secrets
                      key: PRICE_SYNC_SECRET
              args:
                - -fsS
                - -X
                - POST
                - -H
                - "Content-Type: application/json"
                - -H
                - "x-price-sync-secret: $(PRICE_SYNC_SECRET)"
                - -d
                - "{}"
                - http://yieldscope-web:3000/api/prices/sync
